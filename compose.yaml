services:
  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    image: facebook-public-group-scraper
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    env_file:
      - .env
    volumes:
      - ./output:/app/output
    stdin_open: true
    tty: true
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: facebook-public-group-scraper
    restart: unless-stopped
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    env_file:
      - .env
    environment:
      COOKIES_FILE: ""
      HEADLESS: "true"
      API_HOST: "${API_HOST:-0.0.0.0}"
      API_PORT: "${API_PORT:-3000}"
    entrypoint:
      - node
      - src/api/server.js
    volumes:
      - ./output:/app/output
    ports:
      - "127.0.0.1:${API_PORT:-3000}:${API_PORT:-3000}"
